<!-- JS CHANGES -->
<script>

// VALIDATION + CONDITIONAL FLOW
function completeSwipe(){

  const staff  = document.getElementById('staffSelect').value;
  const name   = document.getElementById('nameInput').value.trim();
  const mobile = document.getElementById('mobileInput').value.replace(/\s/g,'');

  if(userRating === 0){
    alert("Please give rating");
    resetSwipe(); return;
  }

  if(!staff){
    alert("Please select staff");
    resetSwipe(); return;
  }

  if(!name){
    alert("Please enter your name");
    resetSwipe(); return;
  }

  if(!mobile || mobile.length < 10){
    alert("Enter valid WhatsApp number");
    resetSwipe(); return;
  }

  // ⭐ KEY CHANGE
  if(userRating <= 3){
    showLowRatingMessage();
    return;
  }

  // EXISTING FLOW
  window.open('https://g.page/r/YOUR_PLACE_ID/review','_blank');
  setTimeout(()=>showScreen('ackScreen'), 400);
}

// LOW RATING SCREEN
function showLowRatingMessage(){
  document.getElementById('formScreen').innerHTML = `
    <div style="display:flex;justify-content:center;align-items:center;height:100vh;text-align:center;padding:20px;">
      <div>
        <h2 style="color:#1a73e8;">🙏 Thank You</h2>
        <p style="margin-top:10px;color:#555;">
          We appreciate your feedback.<br>
          We will improve our service.
        </p>
      </div>
    </div>
  `;
}

// RESET SWIPE
function resetSwipe(){
  thumb.style.left='4px';
  fill.style.width='0%';
  lbl.classList.remove('hidden');
}

</script>
