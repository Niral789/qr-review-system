<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Customer Review</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="app-viewport">
    <header class="logo-container">
        <div class="google-wrapper">
            <img src="assets/google.png" alt="Google" class="img-fluid">
        </div>
        <div class="brand-wrapper">
            <img src="assets/brand.png" alt="Brand" class="img-fluid">
        </div>
    </header>

    <main class="form-sheet">
        <h1 class="title">Rate Your Experience</h1>
        
        <div class="section">
            <label class="input-label">Overall Satisfaction</label>
            <div class="star-row" id="stars">
                <span onclick="rate(1)">★</span>
                <span onclick="rate(2)">★</span>
                <span onclick="rate(3)">★</span>
                <span onclick="rate(4)">★</span>
                <span onclick="rate(5)">★</span>
            </div>
        </div>

        <div class="field-group">
            <label class="input-label">Assisted By</label>
            <select id="staff">
                <option value="" disabled selected>Select Staff Member</option>
                <option value="Niral">Niral</option>
                <option value="Rahul">Rahul</option>
            </select>
        </div>

        <div class="field-group">
            <label class="input-label">Your Name</label>
            <input type="text" id="name" placeholder="Enter your name">
        </div>

        <div class="field-group">
            <label class="input-label">Mobile Number</label>
            <input type="tel" id="mobile" placeholder="Enter mobile number">
        </div>

        <div class="field-group">
            <label class="input-label">Recommendation</label>
            <textarea id="reviewText" placeholder="Write a short review..."></textarea>
        </div>

        <div class="swipe-container" id="swipeTrack">
            <div class="swipe-text">Swipe to Open Google Review</div>
            <div class="swipe-handle" id="swipeThumb">→</div>
        </div>

        <p class="disclaimer">By swiping, you agree to post this on Google.</p>
    </main>
</div>

<script src="script.js"></script>
</body>
</html>
