<!DOCTYPE html>
<html>
<head>
  <title>Rate Us</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
  <div class="card">

    <!-- LOGOS -->
    <div class="logo-row">
      <img src="assets/google.png" class="logo">
      <img src="assets/brand.png" class="logo">
    </div>

    <h2>Rate Your Experience</h2>

    <!-- ⭐ RATING -->
    <div class="rating" id="stars">
      <span onclick="rate(1)">★</span>
      <span onclick="rate(2)">★</span>
      <span onclick="rate(3)">★</span>
      <span onclick="rate(4)">★</span>
      <span onclick="rate(5)">★</span>
    </div>

    <!-- FORM -->
    <div id="formSection" class="hidden">

      <select id="staff">
        <option>Select Staff</option>
        <option>Niral</option>
        <option>Rahul</option>
      </select>

      <input type="text" id="name" placeholder="Your Name">
      <input type="text" id="mobile" placeholder="Mobile Number">

      <textarea id="reviewText"></textarea>

      <button onclick="goToGoogle()">Copy & Go to Google Review</button>

    </div>

    <!-- CONFIRM -->
    <div id="confirmSection" class="hidden">
      <button class="secondary" onclick="showWheel()">I have submitted review</button>
    </div>

    <!-- SPIN -->
    <div id="wheelSection" class="hidden">
      <div class="wheel" id="wheel"></div>
      <button onclick="spinWheel()">Spin</button>
      <h3 id="reward"></h3>
    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
